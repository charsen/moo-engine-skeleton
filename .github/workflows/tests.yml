# CI：跑 engine/ 的全量测试（sqlite 内存库，无需外部服务）。
#
# 生效条件：
# 1. 本仓库镜像/迁移到 GitHub 后自动启用；
# 2. moo-* 包的获取：当前过渡期使用 engine/composer.json 里的三个 VCS 仓库。
#    - moo-scaffold：公开 Gitee 仓库（HTTPS，无需凭据）
#    - moo-monitor-laravel：公开 GitHub 仓库（HTTPS，无需凭据）
#    - moo-system：私有 Gitee 仓库，需在仓库 Secrets 配 COMPOSER_AUTH
#      （Gitee 个人访问令牌，格式见下方 env）。
#    Packagist 同步 moo-scaffold / moo-monitor-laravel 目标版本后，可改用
#    composer.production.json，届时仅 moo-system 需要凭据。
name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1
      # moo-system 私有 Gitee 包的 HTTPS 认证。
      # 格式：{"http-basic":{"gitee.com":{"username":"<user>","password":"<token>"}}}
      # 在仓库 Settings → Secrets → Actions 中配置 MOO_PACKAGES_GITEE_TOKEN。
      COMPOSER_AUTH: ${{ secrets.MOO_PACKAGES_GITEE_TOKEN }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, mbstring, bcmath
          coverage: none
          ini-file: production

      - name: 安装依赖（当前 VCS 过渡配置）
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: 准备应用
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 测试（43 个，sqlite :memory:）
        run: php artisan test
