# CI：跑 engine/ 的全量测试（sqlite 内存库，无需外部服务）。
#
# 生效条件：
# 1. 本仓库镜像/迁移到 GitHub 后自动启用；
# 2. moo-* 包的获取：当前过渡期使用 engine/composer.json 里的三个 VCS 仓库，
#    统一走 HTTPS，避免 GitHub Actions 依赖 Gitee SSH deploy key。
#    Packagist 同步 moo-scaffold / moo-monitor-laravel 目标版本后，可改用
#    composer.production.json，仅保留 moo-system 的 VCS 源。
name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: 安装依赖（当前 VCS 过渡配置）
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: 准备应用
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 测试（45 个，sqlite :memory:）
        run: php artisan test
